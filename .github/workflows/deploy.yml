name: Deploy beta to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate:data

      - name: Validate expanded schema
        run: npm run validate:expanded-schema

      - name: Audit guideline provenance
        run: npm run audit:guideline-provenance

      - name: Audit workflow risk
        run: npm run audit:workflow-risk

      - name: Audit contradictions
        run: npm run audit:contradictions

      - name: Audit medication safety
        run: npm run audit:medication-safety

      - name: Test core safety
        run: npm run test:safety

      - name: Test all workflows
        run: npm run test:all-workflows

      - name: Test output safety
        run: npm run test:output-safety

      - name: Test exclusions
        run: npm run test:exclusions

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          VITE_BUILD_SHA: ${{ github.sha }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
