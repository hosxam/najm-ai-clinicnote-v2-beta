<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Najm guideline beta catalogue</title><style>body{font:16px system-ui;margin:0;background:#f6f8fb;color:#172033}main{max-width:1100px;margin:auto;padding:24px}input,select{padding:10px;margin:4px;border:1px solid #b8c1d1;border-radius:6px}.card{background:white;border:1px solid #dbe1eb;border-radius:8px;padding:14px;margin:10px 0}.muted{color:#5d687c}.item{padding:8px 0;border-top:1px solid #edf0f5}</style></head><body><main><h1>Najm AI ClinicNote — guideline beta</h1><p id="summary" class="muted">Loading…</p><label>Search <input id="search" aria-label="Search workflows"></label><label>Status <select id="status"><option value="">Usable workflows</option><option value="reconstructed_complete">Complete</option><option value="reconstructed_with_noncritical_documented_limitations">With documented limitations</option></select></label><section id="results"></section></main><script>Promise.all([fetch('catalog.json').then(r=>r.json()),fetch('inactive-inventory.json').then(r=>r.json())]).then(([catalog,inactive])=>{const summary=document.querySelector('#summary'),results=document.querySelector('#results'),search=document.querySelector('#search'),status=document.querySelector('#status');summary.textContent=`1500 workflows; ${catalog.usable_workflow_count} usable; ${catalog.item_count} evidence-backed items; ${inactive.workflow_count} inactive`;function render(){const q=search.value.toLowerCase(),s=status.value;const rows=catalog.workflows.filter(w=>(!q||w.workflow_id.includes(q)||w.title.toLowerCase().includes(q))&&(!s||w.final_status===s)).slice(0,100);results.innerHTML=rows.map(w=>`<article class="card"><h2>${w.title}</h2><div class="muted">${w.workflow_id} · ${w.archetype} · ${w.final_status}</div><p>Sections: ${w.sections.join(', ')}</p><div>${w.active_items.length? w.active_items.slice(0,5).map(i=>`<div class="item">${i.final_wording}<br><small>Source: ${i.source_id}; locator: ${i.exact_locator.section_heading||i.exact_locator.heading_path?.join(' / ')||'exact archive locator'}</small></div>`).join(''): '<p class="muted">No usable clinical content; see inactive inventory.</p>'}</div></article>`).join('')||'<p>No matching usable workflows.</p>'}search.addEventListener('input',render);status.addEventListener('change',render);render()}).catch(e=>{document.querySelector('#summary').textContent='Catalogue load failed';console.error(e)})</script></body></html>
